name: Bug Report
description: Create a report to help us improve Kinetic-RT
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler version, CUDA/ROCm version, etc.
      placeholder: Ubuntu 22.04, GCC 11, CUDA 12.1
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The version or commit hash of Kinetic-RT you are using.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `python scripts/...`
        2. Execute `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please paste any relevant error logs or output.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: If applicable, add screenshots to help explain your problem. You can drag and drop images here.
